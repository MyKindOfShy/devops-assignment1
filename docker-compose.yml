version: '3.8'

services:
  flask-app:
    build: ./flask-app
    image: mykindofshy/flask-running-app:latest
    container_name: flask-app
    expose:
      - "8080"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - flask-app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge